<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <form>
        <h1>Job Application Form</h1>
        <label for="name" class="subhead">Full Name: </label>
        <input type="text" placeholder="Enter your name" id="name" class="fields" required >
        <label for="email" class="subhead">Email: </label>
        <input type="email" id="email" placeholder="Enter your email" required class="fields">
        <label for="position" class="subhead">Position</label>
        <select id="position" name="position" class="fields">
            <option selected disabled>Select a position</option>
            <option value="developer">Developer</option>
            <option value="designer">Designer</option>
            <option value="manager">Manager</option>
        </select>
        <fieldset class="radio-group">
            <legend class="subhead">Availability:</legend>
            <input type="radio" id="fulltime" name="availability" value="full-time" >
            <label for="fulltime" class="radio-btn">Full-time</label>
            <input type="radio" id="parttime" name="availability" value="part-time" >
            <label for="parttime" class="radio-btn">Part-time</label> 
        </fieldset>
        <label for='message' class="subhead">Why do you want this job?</label>

        <textarea id="message" placeholder="Write your motivation" rows="4" cols="100"></textarea>
        <button type="submit" id="submit_btn">Submit Application</button>
    </form>
  </div>
</body>
</html>
